<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>
    <radialGradient id="crystalGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#9bff8a"/>
      <stop offset="50%" stop-color="#3cff8f"/>
      <stop offset="100%" stop-color="#0b5f3b"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0b0f1c"/>

  <!-- Main crystal -->
  <polygon
    points="32,6 46,26 38,56 26,56 18,26"
    fill="url(#crystalGlow)"
    stroke="#b6ffd1"
    stroke-width="2"
  />

  <!-- Inner highlight -->
  <polygon
    points="32,14 38,28 34,46 30,46 26,28"
    fill="#c9ffd8"
    opacity="0.5"
  />

  <!-- Glow center -->
  <circle cx="32" cy="32" r="4" fill="#eafff2"/>

</svg>